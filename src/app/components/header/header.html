<header class="topbar">
  <!-- Logo -->
  <a class="logo" style="text-decoration:none;gap:8px;display:flex;align-items:center">
    <img src="assets/ICONO PresuXcel.png" alt="PresuXcel" style="height:30px;width:auto;object-fit:contain"
      onerror="this.style.display='none'">
    <span style="font-size:15px;font-weight:800;color:var(--brand);letter-spacing:.02em">PresuXcel</span>
  </a>

  <!-- Right actions -->
  <div class="topbar-right">
    <!-- Currency selector -->
    <div class="currency-sel">
      <i class="ph ph-coins" style="color:var(--brand);font-size:14px"></i>
      <select [ngModel]="configService.monedaGlobal()" (ngModelChange)="configService.monedaGlobal.set($event)"
        style="background:transparent;border:none;outline:none;font-size:11px;font-weight:700;color:var(--gray-text);cursor:pointer">
        <option value="RD$">RD$ — Peso Dominicano</option>
        <option value="US$">US$ — Dólar</option>
        <option value="€">€ — Euro</option>
        <option value="MXN">MXN — Peso Mexicano</option>
        <option value="COP">COP — Peso Colombiano</option>
        <option value="CLP">CLP — Peso Chileno</option>
        <option value="S/.">S/. — Sol Peruano</option>
      </select>
    </div>

    <!-- Logged-in user -->
    @if (supabase.currentUser()) {
      <div class="topbar-user">
        <i class="ph ph-user-circle" style="font-size:16px;color:var(--brand)"></i>
        <span>{{ supabase.currentUser()?.email }}</span>
      </div>
    }

    <!-- Logout -->
    <button (click)="logout()" class="btn-logout" title="Cerrar sesión">
      <i class="ph ph-sign-out"></i> Salir
    </button>
  </div>
</header>
