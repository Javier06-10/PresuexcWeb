<div style="display:flex;flex-direction:column;gap:10px">

  <!-- LISTADO DE PUNTOS -->
  <div class="card">
    <div class="card-title">
      <i class="ph ph-pipe" style="font-size:13px;color:var(--brand)"></i>
      Puntos de Instalación Sanitaria
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead>
        <tr style="background:var(--gray-3)">
          <th style="padding:6px 8px;text-align:left;font-size:10px;font-weight:700;color:var(--gray-hint);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--gray-border)">Descripción / Ubicación</th>
          <th style="padding:6px 8px;text-align:left;font-size:10px;font-weight:700;color:var(--gray-hint);text-transform:uppercase;border-bottom:1px solid var(--gray-border);width:210px">Tipo de instalación</th>
          <th style="padding:6px 8px;text-align:center;font-size:10px;font-weight:700;color:var(--gray-hint);text-transform:uppercase;border-bottom:1px solid var(--gray-border);width:70px">Cant.</th>
          <th style="width:36px;border-bottom:1px solid var(--gray-border)"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of puntos(); let i = index" style="border-bottom:1px solid var(--gray-3)">
          <td style="padding:5px 8px">
            <input type="text" [ngModel]="p.descripcion" (ngModelChange)="updatePunto(i,'descripcion',$event)"
              style="border:1px solid var(--gray-border);border-radius:4px;padding:5px 8px;font-size:12px;background:var(--field-bg);width:100%"
              onfocus="this.style.borderColor='var(--brand)';this.style.background='#fff'"
              onblur="this.style.borderColor='var(--gray-border)';this.style.background='var(--field-bg)'" />
          </td>
          <td style="padding:5px 4px">
            <select [ngModel]="p.tipo" (ngModelChange)="updatePunto(i,'tipo',$event)"
              style="border:1px solid var(--gray-border);border-radius:4px;padding:5px 4px;font-size:11px;background:var(--field-bg);width:100%">
              <option *ngFor="let t of TIPOS" [value]="t">{{ t }}</option>
            </select>
          </td>
          <td style="padding:5px 4px">
            <input type="number" step="1" min="1" [ngModel]="p.cantidad" (ngModelChange)="updatePunto(i,'cantidad',+$event)"
              style="border:1px solid var(--gray-border);border-radius:4px;padding:5px 4px;font-size:12px;background:var(--field-bg);width:100%;text-align:center"
              onfocus="this.style.borderColor='var(--brand)';this.style.background='#fff'"
              onblur="this.style.borderColor='var(--gray-border)';this.style.background='var(--field-bg)'"/>
          </td>
          <td style="padding:5px 4px;text-align:center">
            <button *ngIf="puntos().length > 1" (click)="removePunto(i)"
              style="background:var(--red);color:#fff;border:none;border-radius:4px;padding:4px 7px;cursor:pointer;font-size:12px;display:flex;align-items:center">
              <i class="ph ph-trash"></i>
            </button>
          </td>
        </tr>
      </tbody>
      <tfoot>
        <tr style="background:var(--brand-light)">
          <td colspan="2" style="padding:7px 8px;font-size:11px;font-weight:700;color:var(--brand);text-transform:uppercase;text-align:right">Total Puntos</td>
          <td style="padding:7px 8px;text-align:center;font-size:15px;font-weight:800;color:var(--brand)">{{ totalPuntos() }}</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
    <button (click)="addPunto()" style="margin-top:10px;background:var(--gray-3);color:var(--gray-muted);border:1px dashed var(--gray-border);border-radius:6px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px">
      <i class="ph ph-plus"></i> Añadir Punto
    </button>
  </div>

  <!-- OPCIONES -->
  <div class="row2">
    <div class="card" style="margin-bottom:0">
      <div class="card-title"><i class="ph ph-sliders" style="font-size:13px;color:var(--brand)"></i> Especificaciones</div>
      <div class="f" style="margin-bottom:8px">
        <label>Tipo de tubería</label>
        <select [ngModel]="tipoTuberia()" (ngModelChange)="tipoTuberia.set($event)">
          <option>PVC</option>
          <option>CPVC</option>
          <option>PPR (polipropileno)</option>
          <option>HDPE</option>
          <option>Cobre</option>
          <option>Acero galvanizado</option>
        </select>
      </div>
      <div class="f" style="margin-bottom:8px">
        <label>Diámetro principal</label>
        <select [ngModel]="diametro()" (ngModelChange)="diametro.set($event)">
          <option>1/2"</option>
          <option>3/4"</option>
          <option>1"</option>
          <option>1 1/4"</option>
          <option>1 1/2"</option>
          <option>2"</option>
          <option>3"</option>
          <option>4"</option>
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
          <input type="checkbox" [ngModel]="incluye_accesorios()" (ngModelChange)="incluye_accesorios.set($event)"
            style="width:16px;height:16px;accent-color:var(--brand)" />
          Accesorios (codos, tees, uniones)
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
          <input type="checkbox" [ngModel]="incluye_mano_obra()" (ngModelChange)="incluye_mano_obra.set($event)"
            style="width:16px;height:16px;accent-color:var(--brand)" />
          Mano de obra / instalación
        </label>
      </div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="card-title"><i class="ph ph-list-numbers" style="font-size:13px;color:var(--brand)"></i> Resumen por tipo</div>
      <div style="display:flex;flex-direction:column;gap:5px;font-size:12px">
        <ng-container *ngFor="let t of tiposConPuntos()">
          <div style="display:flex;justify-content:space-between;padding:3px 0">
            <span style="color:var(--gray-muted)">{{ t }}:</span>
            <span style="font-weight:700;color:var(--gray-text)">{{ puntosByTipo(t) }} pts</span>
          </div>
        </ng-container>
        <div *ngIf="tiposConPuntos().length === 0" style="color:var(--gray-hint);font-style:italic;font-size:11px">Sin puntos cargados</div>
        <div style="border-top:1px solid var(--gray-border);padding-top:6px;display:flex;justify-content:space-between">
          <span style="color:var(--brand);font-weight:700">Total:</span>
          <span style="font-weight:800;color:var(--brand);font-size:14px">{{ totalPuntos() }} puntos</span>
        </div>
      </div>
    </div>
  </div>

  <!-- MÉTRICAS -->
  <div class="metrics-row">
    <div class="metric" style="grid-column:span 4;border-color:var(--brand);background:var(--brand-light)">
      <div class="m-lbl" style="color:var(--brand-dark)">Total Puntos Sanitarios</div>
      <div class="m-val" style="font-size:36px;color:var(--brand-dark)">{{ totalPuntos() }}</div>
      <div class="m-unit" style="color:var(--brand)">puntos</div>
    </div>
  </div>

</div>
