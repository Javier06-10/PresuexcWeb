<div *ngIf="uiState.isResetPasswordModalOpen()" class="fixed inset-0 bg-presuOscuro/70 backdrop-blur-xs flex items-center justify-center z-[200]">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 mx-4 border-t-4 border-presuOxido text-center">
    <div class="mb-5">
      <div class="w-14 h-14 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-3 border-2 border-orange-200">
        <i class="ph ph-lock-key text-3xl text-presuOxido"></i>
      </div>
      <h3 class="text-base font-bold text-presuOscuro uppercase tracking-wide">Nueva Contraseña</h3>
      <p class="text-xs text-zinc-500 mt-1">Introduce y confirma tu nueva contraseña para continuar</p>
    </div>

    <ng-container *ngIf="!isDone()">
      <div class="space-y-3 text-left mb-4">
        <div>
          <label class="text-[10px] font-bold text-zinc-500 uppercase mb-1 block">Nueva Contraseña</label>
          <input type="password" [(ngModel)]="newPassword" placeholder="Mínimo 6 caracteres"
            class="w-full bg-presuFondo border border-zinc-300 rounded-lg p-2.5 text-sm font-semibold focus:outline-none focus:border-presuOxido transition">
        </div>
        <div>
          <label class="text-[10px] font-bold text-zinc-500 uppercase mb-1 block">Confirmar Contraseña</label>
          <input type="password" [(ngModel)]="confirmPassword" placeholder="Repite la contraseña"
            class="w-full bg-presuFondo border border-zinc-300 rounded-lg p-2.5 text-sm font-semibold focus:outline-none focus:border-presuOxido transition">
        </div>
      </div>
      <div *ngIf="errorMessage()" class="mb-3 text-xs text-red-600 font-bold bg-red-50 border border-red-200 p-2 rounded-lg text-left">
        {{ errorMessage() }}
      </div>
      <button (click)="confirmReset()" [disabled]="isSaving() || !newPassword || !confirmPassword"
        class="w-full bg-presuOxido text-white py-2.5 rounded-lg text-sm font-bold uppercase shadow-md hover:bg-amber-800 transition disabled:opacity-50 mb-3 flex items-center justify-center gap-2">
        <i class="ph" [class.ph-check]="!isSaving()" [class.ph-spinner]="isSaving()" [class.animate-spin]="isSaving()"></i>
        {{ isSaving() ? 'Guardando...' : 'Confirmar Nueva Contraseña' }}
      </button>
    </ng-container>

    <ng-container *ngIf="isDone()">
      <div class="bg-green-50 border border-green-200 rounded-lg p-5 mb-4 text-green-700">
        <i class="ph ph-check-circle text-3xl block mb-2"></i>
        <p class="font-bold text-sm">¡Contraseña actualizada!</p>
        <p class="text-xs mt-1 opacity-80">Ya puedes ingresar con tu nueva contraseña.</p>
      </div>
    </ng-container>

    <button (click)="closeModal()" class="text-zinc-500 font-bold text-xs hover:text-zinc-700 transition uppercase tracking-wide">
      {{ isDone() ? 'Cerrar' : 'Cancelar' }}
    </button>
  </div>
</div>
