<div id="modalConfig" class="fixed inset-0 bg-presuOscuro/70 backdrop-blur-xs flex items-center justify-center z-50 transition-all duration-300" [class.opacity-0]="!uiState.isConfigModalOpen()" [class.pointer-events-none]="!uiState.isConfigModalOpen()">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-6 mx-4 transform transition-all duration-300 border-t-4 border-presuOxido" [class.scale-95]="!uiState.isConfigModalOpen()">
            <div class="flex items-center justify-between border-b border-zinc-200 pb-3 mb-5">
                <div class="flex items-center gap-2">
                    <i class="ph ph-gear text-xl text-presuOxido"></i>
                    <h3 class="text-base font-bold text-presuOscuro uppercase tracking-wide">Configuración General</h3>
                </div>
                <button (click)="closeModal()" class="text-zinc-400 hover:text-presuOscuro text-xl"><i class="ph ph-x font-bold"></i></button>
            </div>

            <div class="space-y-3">
                <button (click)="openLogoFormat()" class="w-full flex items-center justify-between bg-presuFondo hover:bg-zinc-200 p-3.5 rounded-lg text-xs font-bold text-presuOscuro transition border border-zinc-300 group text-left shadow-sm">
                    <span class="flex items-center gap-2.5"><i class="ph ph-palette text-base text-presuOxido"></i> FORMATO Y LOGO</span>
                    <i class="ph ph-caret-right"></i>
                </button>

                <button (click)="openMeasures()" class="w-full flex items-center justify-between bg-presuFondo hover:bg-zinc-200 p-3.5 rounded-lg text-xs font-bold text-presuOscuro transition border border-zinc-300 group text-left shadow-sm">
                    <span class="flex items-center gap-2.5"><i class="ph ph-ruler text-base text-presuOxido"></i> UNIDADES DE MEDIDA</span>
                    <i class="ph ph-caret-right"></i>
                </button>

                <button (click)="openSteel()" class="w-full flex items-center justify-between bg-presuFondo hover:bg-zinc-200 p-3.5 rounded-lg text-xs font-bold text-presuOscuro transition border border-zinc-300 group text-left shadow-sm">
                    <span class="flex items-center gap-2.5"><i class="ph ph-dots-six-vertical text-base text-presuOxido"></i> BARRAS DE ACERO</span>
                    <i class="ph ph-caret-right"></i>
                </button>

                <button (click)="openConcrete()" class="w-full flex items-center justify-between bg-presuFondo hover:bg-zinc-200 p-3.5 rounded-lg text-xs font-bold text-presuOscuro transition border border-zinc-300 group text-left shadow-sm">
                    <span class="flex items-center gap-2.5"><i class="ph ph-wall text-base text-presuOxido"></i> HORMIGÓN</span>
                    <i class="ph ph-caret-right"></i>
                </button>

                <div class="border-t border-zinc-200 my-2"></div>
                <button (click)="openPrices()" class="w-full flex items-center justify-between bg-presuFondo hover:bg-zinc-200 p-3.5 rounded-lg text-xs font-bold text-presuOscuro transition border border-zinc-300 group text-left shadow-sm">
                    <span class="flex items-center gap-2.5"><i class="ph ph-database text-base text-presuOxido"></i> BASE DE PRECIOS GLOBALES</span>
                    <i class="ph ph-caret-right"></i>
                </button>
            </div>
        </div>
    </div>
