<div *ngIf="uiState.isProfileModalOpen()" class="fixed inset-0 bg-presuOscuro/70 backdrop-blur-xs flex items-center justify-center z-50">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 mx-4 border-t-4 border-presuOxido">
    <div class="flex items-center justify-between border-b border-zinc-200 pb-3 mb-5">
      <div class="flex items-center gap-3">
        <div class="bg-orange-50 p-2 rounded-lg text-presuOxido">
          <i class="ph ph-user-circle text-2xl"></i>
        </div>
        <div>
          <h3 class="text-base font-bold text-presuOscuro uppercase tracking-wide leading-tight">Perfil de Usuario</h3>
          <p class="text-[11px] text-zinc-500 font-bold uppercase tracking-wide">Información de cuenta</p>
        </div>
      </div>
      <button (click)="closeModal()" class="text-zinc-400 hover:text-presuOscuro text-xl transition bg-zinc-100 hover:bg-zinc-200 p-1.5 rounded-lg">
        <i class="ph ph-x font-bold"></i>
      </button>
    </div>

    <div class="mb-5 bg-zinc-50 rounded-lg p-4 border border-zinc-200">
      <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-wide mb-1">Email</div>
      <div class="font-bold text-presuOscuro text-sm">{{ user?.email || '—' }}</div>
      <div class="text-[10px] font-bold text-zinc-500 uppercase tracking-wide mt-3 mb-1">ID de Usuario</div>
      <div class="font-mono text-xs text-zinc-400 truncate">{{ user?.id || '—' }}</div>
    </div>

    <div class="mb-4">
      <h4 class="text-xs font-bold text-presuOscuro uppercase tracking-wide mb-3 border-b border-zinc-200 pb-2">
        Cambiar Contraseña
      </h4>
      <div class="space-y-3">
        <div>
          <label class="text-[10px] font-bold text-zinc-500 uppercase mb-1 block">Nueva Contraseña</label>
          <input type="password" [(ngModel)]="newPassword" placeholder="Mínimo 6 caracteres"
            class="w-full bg-presuFondo border border-zinc-300 rounded-lg p-2 text-xs font-semibold focus:outline-none focus:border-presuOxido transition">
        </div>
        <div>
          <label class="text-[10px] font-bold text-zinc-500 uppercase mb-1 block">Confirmar Contraseña</label>
          <input type="password" [(ngModel)]="confirmPassword" placeholder="Repite la contraseña"
            class="w-full bg-presuFondo border border-zinc-300 rounded-lg p-2 text-xs font-semibold focus:outline-none focus:border-presuOxido transition">
        </div>
      </div>
      <div *ngIf="errorMessage()" class="mt-2 text-xs text-red-600 font-bold bg-red-50 border border-red-200 p-2 rounded-lg">
        {{ errorMessage() }}
      </div>
      <div *ngIf="successMessage()" class="mt-2 text-xs text-green-700 font-bold bg-green-50 border border-green-200 p-2 rounded-lg flex items-center gap-1">
        <i class="ph ph-check-circle"></i> {{ successMessage() }}
      </div>
    </div>

    <div class="flex justify-end gap-3 pt-4 border-t border-zinc-200">
      <button (click)="closeModal()" class="text-zinc-500 hover:text-zinc-800 px-4 py-2 rounded-lg text-xs font-bold uppercase transition bg-zinc-100 hover:bg-zinc-200">
        Cerrar
      </button>
      <button (click)="changePassword()" [disabled]="isSaving() || !newPassword || !confirmPassword"
        class="bg-presuOxido text-white px-5 py-2 rounded-lg text-xs font-bold uppercase shadow-md hover:bg-amber-800 transition disabled:opacity-50 flex items-center gap-1.5">
        <i class="ph" [class.ph-lock-key]="!isSaving()" [class.ph-spinner]="isSaving()" [class.animate-spin]="isSaving()"></i>
        {{ isSaving() ? 'Guardando...' : 'Cambiar Contraseña' }}
      </button>
    </div>
  </div>
</div>
