<div *ngIf="uiState.isFullerModalOpen()" class="fixed inset-0 bg-presuOscuro/70 backdrop-blur-xs flex items-center justify-center z-[60] transition-all duration-300">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl p-6 mx-4 border-t-4 border-presuOxido">
        <div class="flex items-center justify-between border-b border-zinc-200 pb-3 mb-5">
            <div class="flex items-center gap-3">
                <div class="bg-orange-50 p-2 rounded-lg text-presuOxido">
                    <i class="ph ph-calculator text-2xl"></i>
                </div>
                <div>
                    <h3 class="text-base font-bold text-presuOscuro uppercase tracking-wide leading-tight">MÉTODO DE PROPORCIONES (FULLER)</h3>
                    <p class="text-[11px] text-zinc-500 font-bold uppercase tracking-wide">{{ configService.fullerDosificaciones().length }} configurados</p>
                </div>
            </div>
            <button (click)="closeModal()" class="text-zinc-400 hover:text-red-500 text-xl transition"><i class="ph ph-x font-bold"></i></button>
        </div>
        
        <div class="grid grid-cols-12 gap-3 mb-4">
            <div class="col-span-3 flex flex-col">
                <label class="text-[10px] font-bold text-zinc-500 uppercase mb-1">Nombre / Tipo</label>
                <input type="text" [(ngModel)]="nombre" placeholder="Ej. Hormigón 210" class="bg-presuFondo border border-zinc-300 rounded-lg p-2 text-xs font-semibold focus:outline-none focus:border-presuOxido">
            </div>
            <div class="col-span-2 flex flex-col">
                <label class="text-[10px] font-bold text-zinc-500 uppercase mb-1">Cemento</label>
                <input type="number" [(ngModel)]="cemento" placeholder="Ej. 1" class="bg-presuFondo border border-zinc-300 rounded-lg p-2 text-xs font-semibold focus:outline-none focus:border-presuOxido">
            </div>
            <div class="col-span-2 flex flex-col">
                <label class="text-[10px] font-bold text-zinc-500 uppercase mb-1">Arena</label>
                <input type="number" [(ngModel)]="arena" placeholder="Ej. 2" class="bg-presuFondo border border-zinc-300 rounded-lg p-2 text-xs font-semibold focus:outline-none focus:border-presuOxido">
            </div>
            <div class="col-span-2 flex flex-col">
                <label class="text-[10px] font-bold text-zinc-500 uppercase mb-1">Grava</label>
                <input type="number" [(ngModel)]="grava" placeholder="Ej. 4" class="bg-presuFondo border border-zinc-300 rounded-lg p-2 text-xs font-semibold focus:outline-none focus:border-presuOxido">
            </div>
            <div class="col-span-3 flex items-end">
                <button (click)="addFullerConfig()" [disabled]="!nombre || !cemento || !arena || !grava" class="w-full bg-presuOscuro text-white p-2 rounded-lg text-xs font-bold uppercase transition disabled:opacity-50 hover:bg-zinc-700 flex justify-center items-center gap-1 shadow-sm h-[34px]">
                    <i class="ph ph-plus font-bold"></i> Añadir
                </button>
            </div>
        </div>

        <div class="bg-presuFondo rounded-xl border border-zinc-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-zinc-200/60 text-[10px] uppercase text-zinc-500 border-b border-zinc-200">
                    <tr>
                        <th class="p-3 font-black">Nombre / Tipo</th>
                        <th class="p-3 font-black">Cemento</th>
                        <th class="p-3 font-black">Arena</th>
                        <th class="p-3 font-black">Grava</th>
                        <th class="p-3 font-black text-center w-16">Acción</th>
                    </tr>
                </thead>
                <tbody class="text-xs">
                    <tr *ngFor="let item of configService.fullerDosificaciones(); let i = index" class="border-b border-zinc-100 last:border-0 hover:bg-zinc-50 transition">
                        <td class="p-3 font-bold text-presuOscuro">{{ item.nombre }}</td>
                        <td class="p-3 font-semibold text-zinc-600">{{ item.cemento }}</td>
                        <td class="p-3 font-semibold text-zinc-600">{{ item.arena }}</td>
                        <td class="p-3 font-semibold text-zinc-600">{{ item.grava }}</td>
                        <td class="p-3 text-center">
                            <button (click)="removeFullerConfig(i)" class="text-zinc-400 hover:text-red-500 transition hover:bg-red-50 p-1.5 rounded-lg">
                                <i class="ph ph-trash font-bold"></i>
                            </button>
                        </td>
                    </tr>
                    <tr *ngIf="configService.fullerDosificaciones().length === 0">
                        <td colspan="5" class="p-6 text-center text-zinc-400 text-xs italic">
                            No hay dosificaciones configuradas.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-6 pt-4 border-t border-zinc-200 flex justify-end gap-3">
            <button (click)="closeModal()" class="bg-zinc-200 hover:bg-zinc-300 px-4 py-2 rounded-lg text-xs font-bold uppercase text-presuOscuro transition">
                Cancelar
            </button>
            <button (click)="save()" class="bg-presuOxido text-white px-5 py-2 rounded-lg text-xs font-bold uppercase shadow-md hover:bg-amber-800 transition">
                Confirmar
            </button>
        </div>
    </div>
</div>
