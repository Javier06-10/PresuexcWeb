<div id="modalPreciosGlobales" class="fixed inset-0 bg-presuOscuro/70 backdrop-blur-xs flex items-center justify-center z-50 transition-all duration-300" [class.opacity-0]="!uiState.isPricesModalOpen()" [class.pointer-events-none]="!uiState.isPricesModalOpen()">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-6xl p-6 mx-4 transform transition-all duration-300 border-t-4 border-presuOxido" [class.scale-95]="!uiState.isPricesModalOpen()">
            
            <div class="flex items-center justify-between border-b border-zinc-200 pb-3 mb-4">
                <div class="flex items-center gap-2">
                    <i class="ph ph-database text-xl text-presuOxido"></i>
                    <h3 class="text-base font-bold text-presuOscuro uppercase tracking-wide">Base de Precios Globales</h3>
                </div>
                <button (click)="backToConfig()" class="text-zinc-400 hover:text-presuOscuro flex items-center gap-1 text-xs font-bold uppercase transition">
                    <i class="ph ph-arrow-left font-bold"></i> Volver
                </button>
            </div>

            <div class="flex justify-center bg-zinc-100 p-1 border border-zinc-300 rounded-xl max-w-lg mx-auto mb-4 shadow-inner">
                <button (click)="setType('MAT')" [class.bg-presuOxido]="activeType() === 'MAT'" [class.text-white]="activeType() === 'MAT'" [class.shadow-md]="activeType() === 'MAT'" [class.text-zinc-500]="activeType() !== 'MAT'" class="w-1/3 text-center py-2 text-xs font-black uppercase tracking-wider rounded-lg transition duration-200 hover:text-presuOscuro">
                    Materiales
                </button>
                <button (click)="setType('MO')" [class.bg-presuOxido]="activeType() === 'MO'" [class.text-white]="activeType() === 'MO'" [class.shadow-md]="activeType() === 'MO'" [class.text-zinc-500]="activeType() !== 'MO'" class="w-1/3 text-center py-2 text-xs font-black uppercase tracking-wider rounded-lg transition duration-200 hover:text-presuOscuro">
                    Mano de Obra
                </button>
                <button (click)="setType('JOR')" [class.bg-presuOxido]="activeType() === 'JOR'" [class.text-white]="activeType() === 'JOR'" [class.shadow-md]="activeType() === 'JOR'" [class.text-zinc-500]="activeType() !== 'JOR'" class="w-1/3 text-center py-2 text-xs font-black uppercase tracking-wider rounded-lg transition duration-200 hover:text-presuOscuro">
                    Jornales Diarios
                </button>
            </div>

            <div id="contenedor-filtro-capitulo" class="bg-zinc-50 border border-zinc-300 rounded-xl p-4 flex items-center gap-3 shadow-sm mb-4 transition-all duration-200">
                <div class="flex-1">
                    <label class="text-[10px] font-black text-presuOscuro uppercase tracking-wide block mb-1">Filtrar por Capítulo Técnico</label>
                    <select [(ngModel)]="activeCategory" class="w-full bg-white border border-zinc-300 rounded-lg p-2.5 text-xs font-bold text-presuOscuro focus:outline-none cursor-pointer shadow-inner">
                        </select>
                </div>
                <button (click)="addCategory()" class="mt-5 h-10 w-10 flex items-center justify-center rounded-xl bg-presuOscuro hover:bg-zinc-600 text-white font-bold transition shadow-md text-lg select-none" title="Agregar Categoría Nueva">
                    +
                </button>
            </div>

            <div class="border border-zinc-300 rounded-xl overflow-hidden bg-white shadow-sm">
                <div class="overflow-x-auto max-h-[340px]">
                    <table class="w-full text-left text-xs border-collapse min-w-[900px]">
                        <thead>
                            <tr class="bg-zinc-800 text-white text-[10px] uppercase font-bold tracking-wider sticky top-0 z-10">
                                <th class="p-3 border-r border-zinc-700 w-1/4">Descripción de Partida / Insumo</th>
                                <th class="p-3 border-r border-zinc-700 text-center w-[13%]">Precio 1</th>
                                <th class="p-3 border-r border-zinc-700 text-center w-[13%]">Precio 2</th>
                                <th class="p-3 border-r border-zinc-700 text-center w-[13%]">Precio 3</th>
                                <th class="p-3 border-r border-zinc-700 text-center w-[13%]">Precio 4</th>
                                <th class="p-3 border-r border-zinc-700 text-center w-[13%]">Precio 5</th>
                                <th class="p-3 text-center w-[6%]">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-precios-dinamica" class="font-bold text-presuOscuro">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="mt-3 flex justify-start">
                <button (click)="addRow()" class="flex items-center gap-1.5 bg-zinc-800 hover:bg-zinc-700 text-white font-bold text-xs px-4 py-2 rounded-xl shadow transition">
                    <i class="ph ph-plus-bold"></i>
                    <span>Añadir Fila</span>
                </button>
            </div>

            <div class="mt-4 pt-3 border-t border-zinc-200 flex justify-end">
                <button (click)="confirm()" class="bg-presuOxido text-white font-bold px-6 py-2 rounded-lg text-xs uppercase shadow shadow-md">Confirmar</button>
            </div>
        </div>
    </div>
