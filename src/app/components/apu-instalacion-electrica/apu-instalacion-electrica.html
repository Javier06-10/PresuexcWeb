<div style="display:flex;flex-direction:column;gap:10px">

  <!-- PUNTOS ELÉCTRICOS -->
  <div class="card">
    <div class="card-title">
      <i class="ph ph-lightning" style="font-size:13px;color:var(--brand)"></i>
      Puntos Eléctricos
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead>
        <tr style="background:var(--gray-3)">
          <th style="padding:6px 8px;text-align:left;font-size:10px;font-weight:700;color:var(--gray-hint);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--gray-border)">Descripción / Ambiente</th>
          <th style="padding:6px 8px;text-align:left;font-size:10px;font-weight:700;color:var(--gray-hint);text-transform:uppercase;border-bottom:1px solid var(--gray-border);width:200px">Tipo de punto</th>
          <th style="padding:6px 8px;text-align:center;font-size:10px;font-weight:700;color:var(--gray-hint);text-transform:uppercase;border-bottom:1px solid var(--gray-border);width:70px">Cant.</th>
          <th style="width:36px;border-bottom:1px solid var(--gray-border)"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let punto of puntos(); let i = index" style="border-bottom:1px solid var(--gray-3)">
          <td style="padding:5px 8px">
            <input type="text" [ngModel]="punto.descripcion" (ngModelChange)="updatePunto(i,'descripcion',$event)"
              style="border:1px solid var(--gray-border);border-radius:4px;padding:5px 8px;font-size:12px;background:var(--field-bg);width:100%"
              onfocus="this.style.borderColor='var(--brand)';this.style.background='#fff'"
              onblur="this.style.borderColor='var(--gray-border)';this.style.background='var(--field-bg)'" />
          </td>
          <td style="padding:5px 4px">
            <select [ngModel]="punto.tipo" (ngModelChange)="updatePunto(i,'tipo',$event)"
              style="border:1px solid var(--gray-border);border-radius:4px;padding:5px 4px;font-size:11px;background:var(--field-bg);width:100%">
              <option *ngFor="let t of TIPOS" [value]="t">{{ t }}</option>
            </select>
          </td>
          <td style="padding:5px 4px">
            <input type="number" step="1" min="0" [ngModel]="punto.cantidad" (ngModelChange)="updatePunto(i,'cantidad',+$event)"
              style="border:1px solid var(--gray-border);border-radius:4px;padding:5px 4px;font-size:12px;background:var(--field-bg);width:100%;text-align:center"
              onfocus="this.style.borderColor='var(--brand)';this.style.background='#fff'"
              onblur="this.style.borderColor='var(--gray-border)';this.style.background='var(--field-bg)'"/>
          </td>
          <td style="padding:5px 4px;text-align:center">
            <button *ngIf="puntos().length > 1" (click)="removePunto(i)"
              style="background:var(--red);color:#fff;border:none;border-radius:4px;padding:4px 7px;cursor:pointer;font-size:12px;display:flex;align-items:center">
              <i class="ph ph-trash"></i>
            </button>
          </td>
        </tr>
      </tbody>
      <tfoot>
        <tr style="background:var(--brand-light)">
          <td colspan="2" style="padding:7px 8px;font-size:11px;font-weight:700;color:var(--brand);text-transform:uppercase;text-align:right">Total Puntos</td>
          <td style="padding:7px 8px;text-align:center;font-size:15px;font-weight:800;color:var(--brand)">{{ totalPuntos() }}</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
    <button (click)="addPunto()" style="margin-top:10px;background:var(--gray-3);color:var(--gray-muted);border:1px dashed var(--gray-border);border-radius:6px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px">
      <i class="ph ph-plus"></i> Añadir Punto
    </button>
  </div>

  <!-- ESPECIFICACIONES -->
  <div class="row2">
    <div class="card" style="margin-bottom:0">
      <div class="card-title"><i class="ph ph-sliders" style="font-size:13px;color:var(--brand)"></i> Especificaciones</div>
      <div class="f" style="margin-bottom:8px">
        <label>Tipo de instalación</label>
        <select [ngModel]="tipoInstalacion()" (ngModelChange)="tipoInstalacion.set($event)">
          <option>110V residencial</option>
          <option>220V industrial</option>
          <option>Bifásico (110V/220V)</option>
          <option>Trifásico</option>
        </select>
      </div>
      <div class="f">
        <label>Calibre de cable</label>
        <select [ngModel]="calibre()" (ngModelChange)="calibre.set($event)">
          <option>14 AWG</option>
          <option>12 AWG</option>
          <option>10 AWG</option>
          <option>8 AWG</option>
          <option>6 AWG</option>
        </select>
      </div>
    </div>

    <!-- RESUMEN POR TIPO -->
    <div class="card" style="margin-bottom:0">
      <div class="card-title"><i class="ph ph-list-numbers" style="font-size:13px;color:var(--brand)"></i> Resumen por Tipo</div>
      <div style="display:flex;flex-direction:column;gap:4px;font-size:11px;max-height:180px;overflow-y:auto">
        <ng-container *ngFor="let tipo of TIPOS">
          <div *ngIf="puntosBy(tipo) > 0"
            style="display:flex;justify-content:space-between;align-items:center;padding:4px 6px;background:var(--gray-3);border-radius:4px">
            <span style="color:var(--gray-text)">{{ tipo }}</span>
            <span style="font-weight:700;color:var(--brand);min-width:24px;text-align:right">{{ puntosBy(tipo) }}</span>
          </div>
        </ng-container>
        <div *ngIf="totalPuntos() === 0" style="color:var(--gray-hint);font-style:italic;padding:8px;text-align:center">
          Sin puntos definidos
        </div>
      </div>
    </div>
  </div>

  <!-- MÉTRICAS -->
  <div class="metrics-row">
    <div class="metric" style="grid-column:span 4;border-color:var(--brand);background:var(--brand-light)">
      <div class="m-lbl" style="color:var(--brand-dark)">Total Puntos Eléctricos</div>
      <div class="m-val" style="font-size:36px;color:var(--brand-dark)">{{ totalPuntos() }}</div>
      <div class="m-unit" style="color:var(--brand)">puntos</div>
    </div>
  </div>

</div>
