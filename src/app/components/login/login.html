<div class="min-h-screen flex items-center justify-center bg-presuFondo p-4">
    <div class="bg-white p-8 rounded-xl shadow-xl w-full max-w-md border border-zinc-200">
        <div class="flex justify-center mb-8">
            <!-- Provisional logo text since we don't have the image file here yet -->
            <h1 class="text-3xl font-black text-presuOscuro tracking-tighter">
                Presu<span class="text-presuOxido">Xcel</span>
            </h1>
        </div>
        
        <h2 class="text-xl font-bold text-center text-zinc-800 mb-6">
            {{ isRecoveryMode() ? 'Recuperar Contraseña' : (isRegisterMode() ? 'Crear una cuenta' : 'Iniciar Sesión') }}
        </h2>
        
        <form (ngSubmit)="handleAuth()" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-zinc-600 uppercase mb-1">Correo Electrónico</label>
                <input type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" required
                       class="w-full px-4 py-2 border border-zinc-300 rounded focus:ring-2 focus:ring-presuOxido focus:border-presuOxido outline-none transition"
                       placeholder="tu@correo.com">
            </div>
            
            <div *ngIf="!isRecoveryMode()">
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-xs font-bold text-zinc-600 uppercase">Contraseña</label>
                    <button *ngIf="!isRegisterMode()" type="button" (click)="toggleRecoveryMode()" tabindex="-1" class="text-xs font-bold text-presuOxido hover:underline">¿Olvidaste tu contraseña?</button>
                </div>
                <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" required
                       class="w-full px-4 py-2 border border-zinc-300 rounded focus:ring-2 focus:ring-presuOxido focus:border-presuOxido outline-none transition"
                       placeholder="••••••••">
            </div>
            
            <div *ngIf="errorMsg()" class="text-red-500 text-sm font-medium bg-red-50 p-3 rounded border border-red-200">
                {{ errorMsg() }}
            </div>
            
            <button type="submit" [disabled]="loading()"
                    class="w-full bg-presuOscuro hover:bg-zinc-700 text-white font-bold py-2.5 px-4 rounded transition shadow-md disabled:opacity-50 flex justify-center items-center gap-2">
                <i *ngIf="loading()" class="ph ph-spinner animate-spin"></i>
                {{ loading() ? 'Procesando...' : (isRecoveryMode() ? 'Enviar enlace' : (isRegisterMode() ? 'Registrarse' : 'Entrar')) }}
            </button>
            
            <div class="text-center mt-4 text-sm text-zinc-500 flex flex-col gap-2">
                <button *ngIf="!isRecoveryMode()" type="button" (click)="toggleMode()" class="text-presuOxido hover:underline font-bold">
                    {{ isRegisterMode() ? '¿Ya tienes cuenta? Inicia sesión' : '¿No tienes cuenta? Regístrate gratis' }}
                </button>
                <button *ngIf="isRecoveryMode()" type="button" (click)="backToLogin()" class="text-presuOxido hover:underline font-bold">
                    Volver a Iniciar Sesión
                </button>
            </div>
        </form>
    </div>
</div>
