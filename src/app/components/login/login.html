<div class="min-h-screen flex items-center justify-center bg-presuFondo p-4">
    <div class="bg-white p-8 rounded-xl shadow-xl w-full max-w-md border border-zinc-200">
        <div class="flex justify-center mb-8">
            <!-- Provisional logo text since we don't have the image file here yet -->
            <h1 class="text-3xl font-black text-presuOscuro tracking-tighter">
                Presu<span class="text-presuOxido">Xcel</span>
            </h1>
        </div>
        
        <h2 class="text-xl font-bold text-center text-zinc-800 mb-6">
            {{ isRegisterMode ? 'Crear una cuenta' : 'Iniciar Sesión' }}
        </h2>
        
        <form (ngSubmit)="handleAuth()" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-zinc-600 uppercase mb-1">Correo Electrónico</label>
                <input type="email" [(ngModel)]="email" name="email" required
                       class="w-full px-4 py-2 border border-zinc-300 rounded focus:ring-2 focus:ring-presuOxido focus:border-presuOxido outline-none transition"
                       placeholder="tu@correo.com">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-zinc-600 uppercase mb-1">Contraseña</label>
                <input type="password" [(ngModel)]="password" name="password" required
                       class="w-full px-4 py-2 border border-zinc-300 rounded focus:ring-2 focus:ring-presuOxido focus:border-presuOxido outline-none transition"
                       placeholder="••••••••">
            </div>
            
            <div *ngIf="errorMsg" class="text-red-500 text-sm font-medium bg-red-50 p-3 rounded border border-red-200">
                {{ errorMsg }}
            </div>
            
            <button type="submit" [disabled]="loading"
                    class="w-full bg-presuOscuro hover:bg-zinc-700 text-white font-bold py-2.5 px-4 rounded transition shadow-md disabled:opacity-50 flex justify-center items-center gap-2">
                <i *ngIf="loading" class="ph ph-spinner animate-spin"></i>
                {{ loading ? 'Procesando...' : (isRegisterMode ? 'Registrarse' : 'Entrar') }}
            </button>
            
            <div class="text-center mt-4 text-sm text-zinc-500">
                <button type="button" (click)="toggleMode()" class="text-presuOxido hover:underline font-bold">
                    {{ isRegisterMode ? '¿Ya tienes cuenta? Inicia sesión' : '¿No tienes cuenta? Regístrate gratis' }}
                </button>
            </div>
        </form>
    </div>
</div>
